    <!-- SADRZAJ -->
    <h1 class="text-center slikah1 pt-3 pb-3">Galerija</h1>
    <!-- Slike u redu -->
    <div class="container d-flex justify-content-center">
      <div class="row">
        <div class="row">
        </div>
        <!-- Otvaranje Slika -->
        <div class="row text-center">
          <img src="slike/slika2resize.jpg" onclick="openModal();currentSlide(1)" class="imgCursor hover-shadow img-thumbnail">
        </div>
        <div class="row text-center pl-5">
          <img src="slike/slika3resize.jpg" onclick="openModal();currentSlide(2)" class="imgCursor hover-shadow img-thumbnail">
        </div>
        <div class="row text-center pl-5">
          <img src="slike/slika4resize.jpg" onclick="openModal();currentSlide(3)" class="imgCursor hover-shadow img-thumbnail">
        </div>
      </div>
      
      <!-- Modal Lightbox -->
      <div id="myModal" class="modal">
        <span class="close cursor" onclick="closeModal()">&times;</span>
        <div class="modal-content">
      
          <div class="mySlides">
            <div class="numbertext">1 / 3</div>
            <img src="slike/slika2.jpg" class="w-100">
          </div>
      
          <div class="mySlides">
            <div class="numbertext">2 / 3</div>
            <img src="slike/slika3.jpg" class="w-100">
          </div>
      
          <div class="mySlides">
            <div class="numbertext">3 / 3</div>
            <img src="slike/slika4.jpg" class="w-100">
          </div>
          <!-- Next/previous kontrole -->
          <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
          <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
      </div>

  <script>
    // Otvaranje modala
    function openModal() {
      document.getElementById("myModal").style.display = "block";
    }
    
    // Zatvaranje modala
    function closeModal() {
      document.getElementById("myModal").style.display = "none";
    }
    
    var slideIndex = 1;
    showSlides(slideIndex);
    
    // Next/previous kontrole
    function plusSlides(n) {
      showSlides(slideIndex += n);
    }
    // Funkcionalnost slika
    function showSlides(n) {
      var i;
      var slides = document.getElementsByClassName("mySlides");
      var dots = document.getElementsByClassName("demo");
      var captionText = document.getElementById("caption");
      if (n > slides.length) {slideIndex = 1}
      if (n < 1) {slideIndex = slides.length}
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }
      slides[slideIndex-1].style.display = "block";
      dots[slideIndex-1].className += " active";
      captionText.innerHTML = dots[slideIndex-1].alt;
    }
  </script>
